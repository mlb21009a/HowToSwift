name: iOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:

    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v2
      with:
        xcode-version: '26.3'   # 必要に応じて Xcode バージョンを指定

    - name: Verify Xcode & Swift version
      run: |
        xcode-select -p
        swift --version

    - name: Build with xcodebuild
      run: |
        set -o pipefail
        xcodebuild \
          -workspace HowToSwift.xcworkspace \
          -scheme HowToSwift \
          -configuration Release \
          clean build | xcpretty

    - name: Run tests
      run: |
        set -o pipefail
        xcodebuild \
          -workspace HowToSwift.xcworkspace \
          -scheme HowToSwift \
          -configuration Release \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
          clean test | xcpretty
