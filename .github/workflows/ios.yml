name: iOS CI (Xcode 26)

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    runs-on: macos-26   # macOS 26 Runner を明示的に指定

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode 26
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.0.1'   # 利用可能な Xcode 26 系を指定

    - name: Verify Xcode & Swift version
      run: |
        xcode-select -p
        swift --version

    - name: Build with xcodebuild
      run: |
        set -o pipefail
        xcodebuild \
          -project HowToSwift.xcodeproj \
          -scheme HowToSwift \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          clean build

    - name: Run tests
      run: |
        set -o pipefail
        xcodebuild \
          -project HowToSwift.xcodeproj \
          -scheme HowToSwift \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          clean test
